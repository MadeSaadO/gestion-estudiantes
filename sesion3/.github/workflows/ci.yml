name: CI - Sistema CRUD Estudiantes

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build y Pruebas Automatizadas
    runs-on: ubuntu-latest

    steps:
      - name: 1. Clonar repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 3. Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r sesion1/crud_app/requirements.txt

      - name: 4. Verificar sintaxis del codigo (lint)
        run: |
          python -m py_compile sesion1/crud_app/database.py
          python -m py_compile sesion1/crud_app/models.py
          python -m py_compile sesion1/crud_app/main.py
          echo "Sintaxis verificada correctamente"

      - name: 5. Ejecutar pruebas automatizadas con pytest
        working-directory: sesion1/crud_app
        run: |
          pytest test_models.py -v --tb=short

      - name: 6. Generar reporte de pruebas
        if: always()
        working-directory: sesion1/crud_app
        run: |
          pytest test_models.py -v --tb=short --junit-xml=../../sesion3/reporte_pruebas.xml || true

      - name: 7. Publicar reporte de resultados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-pruebas
          path: sesion3/reporte_pruebas.xml
